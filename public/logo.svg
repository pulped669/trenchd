<svg viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Control bar (top) -->
  <rect x="30" y="8" width="60" height="6" rx="3" fill="url(#barGrad)" opacity="0.9"/>

  <!-- Strings -->
  <line x1="38" y1="14" x2="44" y2="68" stroke="url(#stringGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="14" x2="60" y2="60" stroke="url(#stringGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="82" y1="14" x2="76" y2="68" stroke="url(#stringGrad)" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="14" x2="42" y2="105" stroke="url(#stringGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="75" y1="14" x2="78" y2="105" stroke="url(#stringGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Puppet head -->
  <circle cx="60" cy="72" r="14" fill="url(#headGrad)" opacity="0.85"/>
  <!-- Eyes -->
  <circle cx="54" cy="70" r="2" fill="#ff2a6d" opacity="0.8"/>
  <circle cx="66" cy="70" r="2" fill="#ff2a6d" opacity="0.8"/>

  <!-- Puppet body -->
  <line x1="60" y1="86" x2="60" y2="115" stroke="url(#bodyGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Arms -->
  <line x1="60" y1="95" x2="42" y2="108" stroke="url(#bodyGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="60" y1="95" x2="78" y2="108" stroke="url(#bodyGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Legs -->
  <line x1="60" y1="115" x2="48" y2="140" stroke="url(#bodyGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="60" y1="115" x2="72" y2="140" stroke="url(#bodyGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <defs>
    <linearGradient id="barGrad" x1="30" y1="11" x2="90" y2="11">
      <stop offset="0%" stop-color="#ff2a6d"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#05d9e8"/>
    </linearGradient>
    <linearGradient id="stringGrad" x1="60" y1="14" x2="60" y2="105">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff2a6d" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="46" y1="58" x2="74" y2="86">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="60" y1="86" x2="60" y2="140">
      <stop offset="0%" stop-color="#ededf0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ededf0" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
</svg>
